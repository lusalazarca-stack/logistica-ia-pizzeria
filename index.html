<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard IA - Logística Pizzería</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>SISTEMA LOGÍSTICO <span class="neon">IA</span></h1>
            <p>Monitoreo en Tiempo Real - Cono Norte</p>
        </header>

        <main class="grid-container">
            <div class="card status">
                <h3>Estado de IA</h3>
                <div class="pulse-button">ACTIVO</div>
            </div>
            
            <div class="card metrics">
                <h3>Pedidos Hoy</h3>
                <div class="number">24</div>
            </div>

            <div class="card timer">
                <h3>Ahorro de Tiempo</h3>
                <div class="number">15.4 min</div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
